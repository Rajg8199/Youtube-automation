# PhoneWala Gyan — local stack (Phase 0)
# db: pgvector Postgres (stands in for Supabase Postgres locally)
# worker: FastAPI internal API + job consumers
# remotion-renderer / caddy: declared for later phases (build context stubs)
name: phonewala-gyan

services:
  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-phonewala}
    ports:
      - "${DB_PORT:-54322}:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-phonewala}"]
      interval: 5s
      timeout: 5s
      retries: 10

  worker:
    build:
      context: ..
      dockerfile: apps/worker/Dockerfile
    env_file:
      - ../.env
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql://postgres:postgres@db:5432/phonewala}
      STACK_TIER: ${STACK_TIER:-budget}
      MEDIA_DIR: /app/media
    ports:
      - "${WORKER_PORT:-8000}:8000"
    volumes:
      - media:/app/media
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8000/health').status==200 else 1)\""]
      interval: 10s
      timeout: 5s
      retries: 6

  n8n:
    image: n8nio/n8n:latest
    environment:
      GENERIC_TIMEZONE: Asia/Kolkata
      TZ: Asia/Kolkata
      WORKER_URL: http://worker:8000           # reachable on the compose network
      N8N_SECURE_COOKIE: "false"               # allow http://localhost in dev
      N8N_RUNNERS_ENABLED: "true"
      N8N_DIAGNOSTICS_ENABLED: "false"
    ports:
      - "${N8N_PORT:-5678}:5678"
    volumes:
      - n8n_data:/home/node/.n8n
    depends_on:
      worker:
        condition: service_started

volumes:
  pg_data:
  media:
  n8n_data:
